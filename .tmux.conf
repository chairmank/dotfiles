set -g prefix C-a
unbind C-b
bind C-a send-prefix
setw -g mode-keys vi

# colors taken from https://github.com/altercation/solarized
#
# default statusbar colors
set-option -g status-style bg=black,fg=yellow,default
# default window title colors
set-window-option -g window-style bg=default,fg=brightblue,dim
# active window title colors
set-window-option -g window-status-current-style bg=default,fg=brightred,bright
# pane border
set-option -g pane-border-style fg=black
set-option -g pane-active-border-style fg=brightgreen
# message text
set-option -g message-style bg=black,fg=brightred
# pane number display
set-option -g display-panes-active-colour blue
set-option -g display-panes-colour brightred
# clock
set-window-option -g clock-mode-colour green
